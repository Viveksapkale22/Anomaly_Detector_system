<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Video | Fire & Weapon Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a202c, #2d3748); color: #e2e8f0; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    .upload-container { background: rgba(0,0,0,0.4); padding: 40px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); backdrop-filter: blur(5px); text-align: center; width: 100%; max-width: 500px; }
    h2 { color: #fc8181; margin-bottom: 20px; }
    .btn-upload { background-color: #fc8181; color: #1a202c; font-weight: bold; width: 100%; margin-top: 20px; }
    .btn-upload:hover { background-color: #e53e3e; color: white; }
    .btn-back { background-color: #4a5568; color: white; width: 100%; margin-top: 10px; }
    .btn-back:hover { background-color: #2d3748; color: white; }
  </style>
</head>
<body>
  <div class="upload-container">
    <h2>Upload Threat Detection Video</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('fire_upload') }}" method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <input class="form-control" type="file" name="file" accept="video/mp4,video/x-m4v,video/*" required>
      </div>
      <button type="submit" class="btn btn-upload">Analyze Video</button>
    </form>
    
    <a href="{{ url_for('normal_detection') }}" class="btn btn-back">Return to Dashboard</a>
  </div>
</body>
</html>
