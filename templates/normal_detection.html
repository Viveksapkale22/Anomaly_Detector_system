<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Security Dashboard | Fire & Weapon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a202c, #2d3748); margin: 0; padding: 0; color: #e2e8f0; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { margin: 0; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.6); font-size: 1.8rem; }
    h2 { color: #fc8181; font-size: 1.2rem; margin-top: 5px; text-align: center; }
    .container { max-width: 900px; margin: 40px auto; padding: 30px; background: rgba(0,0,0,0.4); border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
    .video-wrapper { position: relative; padding-top: 56.25%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; border: 2px solid #4a5568; }
    .video-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: block; z-index: 2; }
    .spinner { width: 40px; height: 40px; border: 5px solid #4a5568; border-top: 6px solid #fc8181; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-menu { display: none; position: absolute; background-color: #fff; min-width: 160px; z-index: 20; list-style: none; padding: 0; margin: 0; border-radius: 4px; }
    .dropdown-menu li a { color: #2d3748; padding: 10px 16px; text-decoration: none; display: block; font-weight: 500;}
    .dropdown-menu li a:hover { background-color: #e2e8f0; }
    .dropdown:hover .dropdown-menu { display: block; }
    button { background-color: #4a5568; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: 600; transition: background-color 0.3s; }
    button:hover { background-color: #2d3748; }
    #choose-btn { background-color: #3182ce; }
    #choose-btn:hover { background-color: #2b6cb0; }
    .logout-btn { background-color: #e53e3e; padding: 8px 16px; font-size: 0.9rem;}
    .logout-btn:hover { background-color: #c53030; }
    .button-row { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; gap: 15px; }
  </style>
</head>
<body>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'success' if category == 'success' else 'warning' }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <div class="top-bar">
      <h1>Welcome, {{ username }}</h1>
      <form action="{{ url_for('logout') }}" method="POST" style="margin: 0;">
        <button type="submit" class="logout-btn">Logout</button>
      </form>
    </div>
    <h2>Fire & Weapon Detection Protocol</h2>

    <div class="video-wrapper">
      <div class="loading" id="loading-message"><div class="spinner"></div></div>
      <img id="video-feed" src="{{ url_for('fire_video_feed') }}" alt="Video feed" style="display: none;">
    </div>

    <div class="button-row">
      <div class="dropdown">
        <button id="choose-btn">Choose Source</button>
        <ul class="dropdown-menu">
          <li><a href="{{ url_for('fire_upload') }}">Upload a New Video</a></li>
          <li><a href="#" id="camera-option">Web Camera</a></li>
          <li><a href="#" id="cctv-option">CCTV Stream</a></li>
        </ul>
      </div>
      <button id="terminate-btn" onclick="terminateVideo();">Terminate Video</button>
      <button id="refresh-btn" onclick="refreshVideo();">Refresh Feed</button>
      <button onclick="window.location.href='{{ url_for('auth_area_detection') }}'" style="background-color: #38a169;">Go to Face Tracking</button>
    </div>
  </div>

  <script>
    let currentFeedURL = "{{ url_for('fire_video_feed') }}";
    let videoTerminated = false;
    const videoFeed = document.getElementById('video-feed');
    const loadingMessage = document.getElementById('loading-message');

    function setFeedSource(urlPath) {
      videoTerminated = false;
      currentFeedURL = urlPath;
      refreshVideo();
    }

    document.getElementById('camera-option').onclick = (e) => { e.preventDefault(); setFeedSource("{{ url_for('fire_camera_feed') }}"); };
    document.getElementById('cctv-option').onclick = (e) => { e.preventDefault(); setFeedSource("{{ url_for('fire_cctv_feed') }}"); };

    function refreshVideo() {
      if (videoTerminated) {
        alert("Video has been terminated. Reselect a source."); return;
      }
      videoFeed.style.opacity = "0";
      setTimeout(() => {
        videoFeed.src = currentFeedURL + '?t=' + new Date().getTime();
        videoFeed.style.opacity = "1";
      }, 300);
    }

    function terminateVideo() {
      fetch("{{ url_for('fire_terminate') }}", { method: "POST" }).then(() => {
        videoFeed.src = ""; videoFeed.style.display = 'none';
        loadingMessage.style.display = 'block';
        videoTerminated = true;
      });
    }

    videoFeed.onloadstart = () => { loadingMessage.style.display = 'block'; videoFeed.style.display = 'none'; };
    videoFeed.onload = () => { loadingMessage.style.display = 'none'; videoFeed.style.display = 'block'; };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
